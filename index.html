<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Spin Wheel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container text-center d-flex flex-column justify-content-center align-items-center min-vh-100">

    <h2 class="fw-bold text-primary mb-4">🎡 Student Picker</h2>

    <div class="wheel-container">
        <div class="wheel" id="wheel"></div>

        <button class="spin-btn" onclick="spinWheel()">SPIN</button>

        <div class="pointer">▼</div>
    </div>

    <div id="result" class="mt-4 fs-4 fw-bold text-success">
        Click SPIN to choose a student
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
